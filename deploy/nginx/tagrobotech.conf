upstream tagrobotech_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream tagrobotech_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream tagrobotech_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Public website
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name tagrobotech.com www.tagrobotech.com 13.234.29.101;

    client_max_body_size 25M;

    location /uploads/ {
        proxy_pass http://tagrobotech_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://tagrobotech_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# CMS admin panel — https://admin.tagrobotech.com
server {
    listen 80;
    listen [::]:80;
    server_name admin.tagrobotech.com;

    client_max_body_size 25M;

    location /uploads/ {
        proxy_pass http://tagrobotech_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://tagrobotech_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
