name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate GitHub secrets
        run: |
          missing=0
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::Missing secret EC2_HOST. Add it in GitHub → Settings → Secrets and variables → Actions"
            missing=1
          fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "::error::Missing secret EC2_USER (use: ubuntu)"
            missing=1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "::error::Missing secret EC2_SSH_KEY. Paste the full tagrobotech.pem file contents"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 45m
          script: |
            set -euo pipefail
            APP_DIR="/home/ubuntu/tagrobotech"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git clone https://github.com/nishant5harma/tagrobotech.git .
            fi

            git remote set-url origin https://github.com/nishant5harma/tagrobotech.git
            git fetch origin main
            git reset --hard origin/main

            chmod +x deploy/update.sh deploy/install.sh
            ./deploy/update.sh

            echo "==> Verifying deployment..."
            curl -sf http://127.0.0.1:4000/api/health
            echo ""
            sudo systemctl is-active tagrobotech-backend tagrobotech-frontend tagrobotech-admin nginx
